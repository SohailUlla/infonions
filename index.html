<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infonions - Discover What Unfolds</title>
    <meta name="description" content="Choose your depth. Pulse for quick insights. Deep Dive for full context.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Dark theme */
            --void: #000000;
            --deep-space: #0a0a0f;
            --midnight: #14141f;
            --slate: #1f1f2e;
            
            /* Neon accents */
            --electric-blue: #00d9ff;
            --cyber-purple: #b026ff;
            --signal-green: #00ff88;
            --warning-orange: #ff6b35;
            
            /* Text */
            --ghost-white: #f0f0f5;
            --fog: #a0a0b0;
            --shadow: #606070;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, var(--electric-blue), var(--cyber-purple));
            --gradient-signal: linear-gradient(135deg, var(--signal-green), var(--electric-blue));
        }
        
        body {
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            background: var(--void);
            color: var(--ghost-white);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Animated background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--midnight) 1px, transparent 1px),
                linear-gradient(90deg, var(--midnight) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        /* Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--midnight);
            z-index: 1000;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--shadow);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        
        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        nav a {
            color: var(--fog);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }
        
        nav a:hover {
            color: var(--electric-blue);
        }
        
        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-primary);
            transition: width 0.3s;
        }
        
        nav a:hover::after {
            width: 100%;
        }
        
        /* Mode Switcher */
        .mode-switcher {
            position: relative;
            z-index: 10;
        }
        
        .switcher-container {
            background: var(--midnight);
            border: 2px solid var(--slate);
            border-radius: 50px;
            padding: 6px;
            display: flex;
            gap: 8px;
        }
        
        .mode-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: var(--fog);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .mode-btn.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
        }
        
        /* Hero Section */
        .hero {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 30px;
            text-align: center;
        }
        
        .hero h1 {
            font-size: 64px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero-subtitle {
            font-size: 24px;
            color: var(--fog);
            margin-bottom: 40px;
        }
        
        .hero-description {
            font-size: 18px;
            color: var(--shadow);
            max-width: 700px;
            margin: 0 auto 40px;
        }
        
        /* Feed Container */
        .feed-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px 80px;
        }
        
        /* PULSE MODE - Card Grid */
        .pulse-feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }
        
        .pulse-card {
            background: var(--deep-space);
            border: 1px solid var(--midnight);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .pulse-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gradient-primary);
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        
        .pulse-card:hover {
            border-color: var(--electric-blue);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 217, 255, 0.2);
        }
        
        .pulse-card:hover::before {
            transform: scaleX(1);
        }
        
        .card-category {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .category-politics { background: rgba(255, 107, 53, 0.15); color: #ff6b35; }
        .category-economy { background: rgba(0, 255, 136, 0.15); color: #00ff88; }
        .category-tech { background: rgba(0, 217, 255, 0.15); color: #00d9ff; }
        .category-society { background: rgba(176, 38, 255, 0.15); color: #b026ff; }
        
        .pulse-content {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--ghost-white);
        }
        
        .pulse-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--shadow);
            text-transform: uppercase;
        }
        
        .word-count {
            color: var(--electric-blue);
        }
        
        /* DEEP DIVE MODE - Article List */
        .deepdive-feed {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .deepdive-article {
            background: var(--deep-space);
            border: 1px solid var(--midnight);
            border-radius: 20px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 300px 1fr;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .deepdive-article:hover {
            border-color: var(--electric-blue);
            box-shadow: 0 10px 40px rgba(0, 217, 255, 0.2);
        }
        
        .article-image {
            background: var(--midnight);
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .article-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.3), rgba(176, 38, 255, 0.3));
            mix-blend-mode: overlay;
        }
        
        .article-content {
            padding: 40px;
        }
        
        .article-title {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 15px;
            color: var(--ghost-white);
        }
        
        .article-excerpt {
            font-size: 16px;
            line-height: 1.7;
            color: var(--fog);
            margin-bottom: 20px;
        }
        
        .article-meta {
            display: flex;
            gap: 20px;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--shadow);
            text-transform: uppercase;
        }
        
        .read-time {
            color: var(--electric-blue);
        }
        
        /* Action Bar */
        .action-bar {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--midnight);
        }
        
        .action-btn {
            background: var(--midnight);
            border: 1px solid var(--slate);
            color: var(--fog);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            border-color: var(--electric-blue);
            color: var(--electric-blue);
            transform: translateY(-2px);
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: var(--shadow);
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--midnight);
            border-top-color: var(--electric-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Hidden class */
        .hidden {
            display: none !important;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 40px;
            }
            
            .pulse-feed {
                grid-template-columns: 1fr;
            }
            
            .deepdive-article {
                grid-template-columns: 1fr;
            }
            
            .article-image {
                height: 200px;
            }
            
            nav {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Background Grid -->
    <div class="bg-grid"></div>

    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📡</div>
                <div>
                    <div class="logo-text">INFONIONS</div>
                    <div class="tagline">Discover What Unfolds</div>
                </div>
            </div>
            
            <nav>
                <a href="/">Home</a>
                <a href="/insights">Insights</a>
                <a href="/signals">Signals</a>
                <a href="/about">About</a>
            </nav>
        </div>
    </header>

    <!-- Mode Switcher -->
    <div class="mode-switcher" style="position: sticky; top: 90px; z-index: 100; max-width: 1400px; margin: 30px auto 0; padding: 0 30px;">
        <div class="switcher-container">
            <button class="mode-btn active" data-mode="pulse">
                📡 PULSE
                <span style="font-size: 10px; opacity: 0.7;">Quick</span>
            </button>
            <button class="mode-btn" data-mode="deepdive">
                🔍 DEEP DIVE
                <span style="font-size: 10px; opacity: 0.7;">Full Context</span>
            </button>
        </div>
    </div>

    <!-- Hero -->
    <section class="hero">
        <h1>Choose Your Depth</h1>
        <p class="hero-subtitle">Fearless news for the next generation</p>
        <p class="hero-description">
            PULSE for instant insights. DEEP DIVE for complete context. 
            You decide how deep you want to go.
        </p>
    </section>

    <!-- Feed Container -->
    <div class="feed-container" id="feedContainer">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Loading signals...</p>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
